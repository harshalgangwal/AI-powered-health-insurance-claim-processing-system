version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claims_app
    ports:
      - "8000:8000"
    volumes:
      # SQLite database persists between container restarts
      - claims_data:/app/data
      # Uploaded documents persist between container restarts
      - claims_uploads:/app/uploads
    environment:
      DATABASE_URL: "sqlite:////app/data/claims.db"
      UPLOAD_DIR: "/app/uploads"
      POLICY_PATH: "/app/policy_terms.json"
      # Set to "true" to enable verbose OCR logging
      OCR_SHOW_LOG: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  claims_data:
    driver: local
  claims_uploads:
    driver: local
